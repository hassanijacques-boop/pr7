  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>

  <title>Protocole-Restauration7 — PR7</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0A192F;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
    }
    #login-screen.hidden { display: none; }
    .login-card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-card h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #64ffda;
      margin-bottom: 4px;
    }
    .login-card .subtitle {
      font-size: 0.85rem;
      color: #8892b0;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }
    .login-card p.desc {
      font-size: 0.9rem;
      color: #a8b2d1;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .login-card input {
      width: 100%;
      padding: 14px 16px;
      background: #0A192F;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #64ffda; }
    .login-card input::placeholder { color: #4a5568; }
    .login-card button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: #64ffda;
      color: #0A192F;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-card button:hover { opacity: 0.9; }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    #login-error {
      display: none;
      margin-top: 14px;
      font-size: 0.85rem;
      color: #ef4444;
      background: rgba(239,68,68,0.1);
      padding: 10px;
      border-radius: 8px;
    }
    #login-success {
      display: none;
      margin-top: 14px;
      font-size: 0.85rem;
      color: #64ffda;
      background: rgba(100,255,218,0.1);
      padding: 10px;
      border-radius: 8px;
    }
    .loader {
      display: none;
      margin: 16px auto 0;
      width: 32px; height: 32px;
      border: 3px solid #1e3a5f;
      border-top-color: #64ffda;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app-container.hidden { display: none; }
    #app-container { min-height: 100vh; }
    .footer-text { margin-top: 20px; font-size: 0.75rem; color: #4a5568; }
  </style>
</head>
<body>
  <div id="app-container"><div id="root"></div></div>
